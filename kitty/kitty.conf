# include ~/.config/kitty/themes/eldritch.conf
# include ~/.config/kitty/themes/black_metal_gorgoroth.conf
include ~/.config/kitty/themes/gruvbox-dark.conf

font_family      Maple Mono NF
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 14

hide_window_decorations no 

#:Apply if there's no background image
# background_opacity 0.4
# background_blur 8 

cursor #37f499
# cursor_shape block 
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

mouse_hide_wait 3.0

hide_window_decorations yes

# placement_strategy top-left

window_margin_width 16

#: remember to add /Users/... becasue somehow it won't work with ~/.config
# background_image /Users/tougi41/.config/kitty/background/Wallpaper_Blurred.png
# background_image_layout cscaled

# background_tint         0.75
# background_tint_gaps    0.45
# background_tint_gaps    0.15

macos_show_window_title_in none

# window_border_width     1pt

# ── Tab bar ─ Lean+Frame, matches the p10k prompt aesthetic ─────────────────
tab_bar_edge              bottom 
tab_bar_style             separator
tab_bar_min_tabs          2
tab_bar_align             left
tab_bar_background        none
tab_bar_margin_height     6.0 0.0
tab_bar_margin_color      #262626
tab_separator             " │ "
tab_title_max_length      18
tab_title_template        " {title:^18} "
active_tab_title_template " {fmt.bold}{title:^18}{fmt.nobold} "
tab_activity_symbol       "•"
bell_on_tab               "• "

# Colors map to Oxocarbon palette
# Active tab: blue-tinted dark (15% mix of #33B1FF into #161616) — feels selected
# Inactive tab: dim grey, blends into tab_bar_margin_color for a clean chrome strip
active_tab_foreground     #33B1FF
active_tab_background     #15293D
active_tab_font_style     bold
inactive_tab_foreground   #6F6F6F
inactive_tab_background   #262626
inactive_tab_font_style   normal

set-option -g default-terminal "tmux-256color"
# tell Tmux that outside terminal supports true color
set-option -ga terminal-overrides ',xterm-kitty:cnorm=\E[?12h\E[?25h'
# Toggle full screen
map ctrl+cmd+f toggle_fullscreen 
# rename tab
map cmd+shift+t set_tab_title


# Enable clipboard read/write for image support
clipboard_control write-clipboard write-primary read-clipboard read-primary

# Paste and display image from clipboard (Cmd+Shift+I)
map cmd+shift+i launch --type=overlay ~/.config/kitty/paste_image.sh

# Added by Gogh
include colors.conf
